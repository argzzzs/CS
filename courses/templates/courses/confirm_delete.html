{% extends 'base.html' %}

{% block title %}Delete {{ type }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-danger">
            <div class="card-header">
                <h5 class="mb-0" style="color: var(--danger);">Confirm Delete</h5>
            </div>
            <div class="card-body text-center">
                <p class="fs-5">Are you sure you want to delete:</p>
                <p class="fw-bold fs-4">{{ object }}</p>
                <p class="text-muted">This action cannot be undone.</p>
                <form method="post" class="d-flex gap-2 justify-content-center">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    <a href="{% url 'course_list' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
